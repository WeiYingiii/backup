# ================= 路由规则重构 =================
rules:
  # 优先处理广告和局域网
  - RULE-SET,category-ads-all,🛑 广告拦截
  - RULE-SET,private,DIRECT
  - RULE-SET,private-ip,DIRECT,no-resolve
  
  # Emby 专属策略
  - DOMAIN-KEYWORD,emby,🧩 🎬emby
  - DOMAIN,fd.148918.xyz,🧩 🎬emby

  # 国外规则 -> 国外免流
  - DOMAIN-KEYWORD,cloudflare,🧩 🇺🇳国外免流
  - RULE-SET,category-ai-chat-!cn,🧩 🇺🇳国外免流
  - RULE-SET,openai,🧩 🇺🇳国外免流
  - RULE-SET,anthropic,🧩 🇺🇳国外免流
  - RULE-SET,youtube,🧩 🇺🇳国外免流
  - RULE-SET,google,🧩 🇺🇳国外免流
  - RULE-SET,google-ip,🧩 🇺🇳国外免流,no-resolve
  - RULE-SET,telegram,🧩 🇺🇳国外免流
  - RULE-SET,telegram-ip,🧩 🇺🇳国外免流,no-resolve
  - RULE-SET,apple,🧩 🇺🇳国外免流
  - RULE-SET,geolocation-!cn,🧩 🇺🇳国外免流

  # 国内规则 -> 国内免流
  - RULE-SET,icloud,🧩 🇨🇳国内免流
  - RULE-SET,geolocation-cn,🧩 🇨🇳国内免流
  - RULE-SET,cn-ip,🧩 🇨🇳国内免流,no-resolve
  - RULE-SET,cn,🧩 🇨🇳国内免流

  # 兜底规则 -> 国外免流
  - MATCH,🧩 🇺🇳国外免流