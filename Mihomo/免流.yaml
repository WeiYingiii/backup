# ================= 引入你的订阅链接 =================
proxy-providers:
  my-sub:
    type: http
    url: "https://你的订阅链接地址请填在这里" # <--- 修改这里
    interval: 3600
    path: ./proxies/my-sub.yaml
    health-check:
      enable: true
      interval: 300
      url: "https://www.gstatic.com/generate_204"

# ================= 策略组深度精简 =================
proxy-groups:
  - name: "🧩 🇺🇳国外免流"
    type: url-test
    use: [my-sub]
    filter: "(?i)ml"          # 包含 ml (不区分大小写)
    exclude-filter: "(?i)cn"  # 排除 cn
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  - name: "🧩 🇨🇳国内免流"
    type: url-test
    use: [my-sub]
    filter: "(?i)cn"          # 只保留包含 cn
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  - name: "🧩 🎬emby"
    type: url-test
    use: [my-sub]
    filter: "(?i)ml"             # 包含 ml
    exclude-filter: "(?i)cn|jp"  # 排除 cn 和 jp
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  - name: "🛑 广告拦截"
    type: select
    proxies: [REJECT, DIRECT]

# ================= 规则集保持不变 =================
